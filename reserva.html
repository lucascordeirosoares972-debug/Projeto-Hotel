<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Reserva</title>
    <link rel="shortcut icon" href="img/WhatsApp Image 2026-04-08 at 10.55.55.jpeg" type="image/x-icon">
    <style>.container {
    width: 300px;
    margin: auto;
}</style>


</head>
<body>
    
    <div class="container">
        <form>
            <fieldset class="grupo">
    
        <h2> Reserva de Hotel</h2>
        <label for="nome">Nome: </label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required> <br> 
    
        <label for="cpf">CPF: </label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required> <br>
    
        <label for="telefone">Telefone: </label>
        <input type="tel" id="telefone" name="telefone" placeholder="(00)00000-0000" maxlength="14" required> <br>
    
        <label for="quarto">Quarto: </label> 
        <select name="quarto" id="quarto">
            <option value="" disabled selected></option>
            <option value="simples">Simples</option>
            <option value="duplo">Duplo</option>
            <option value="luxo">Luxo</option>
        </select>  <br>
    
        <label for="check-in"> Check-in:</label>
        <input type="date" id="checkin" name="checkin"placeholder="checkin"> <br>

        <label for="check-out"> Check-out:</label>
        <input type="date" id="checkout" name="checkout" placeholder="checkout"> <br>

        <label for="pessoas">Número de pessoas:</label>
        <input type="number" id="pessoas" name="pessoas" min="1" max="5">
        <br>

        <label for="adicionais">Adicionais:</label> <br>
        <label for="adicional1">Café da Manhã</label>
        <input type="checkbox" name="adicional1" id="adicional1"> <br>

        <label for="adicional2">Estacionamento</label>
        <input type="checkbox" name="adicional2" id="adicional2"> <br>

        <label for="adicional3">SPA</label>
        <input type="checkbox" name="adicional3" id="adicional3">
    
        <br>
        <label for="obs">Observações:</label>
        <br> 
        <textarea id="obs" name="observacoes" rows="5" cols="40" placeholder="Caso tenha alguma observação..."></textarea>
        <br>

        <button type="submit">Enviar</button>
        
    
        <a href="index.html">
        <button type="button">Voltar</button> </a>
            </fieldset>
        </form>
    </div>
</body>
</html>
